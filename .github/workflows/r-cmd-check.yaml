name: R-CMD-check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  R-CMD-check:
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: "release", allow_failure: false}
          - {os: ubuntu-latest, r: "devel", allow_failure: true}
    continue-on-error: ${{ matrix.config.allow_failure }}
    runs-on: ${{ matrix.config.os }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::knitr, any::rmarkdown, any::ggExtra, any::lme4
          needs: check

      - name: Check package
        run: >
          Rscript -e
          'rcmdcheck::rcmdcheck(args = c("--no-manual"),
          build_args = c("--compact-vignettes=gs+qpdf"),
          error_on = "warning")'

  docs-sanity:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rmarkdown, any::knitr, any::jsonlite, any::pkgload
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Run staged validation sanity checks
        env:
          AMRC_PACKAGE_LOAD_MODE: source
        run: Rscript tools/run_validation.R --stage ci

      - name: Run README example workflow
        run: Rscript tools/check_readme_examples.R

      - name: Rebuild vignettes explicitly
        run: Rscript tools/render_vignettes.R
